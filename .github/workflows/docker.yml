name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: nubster/egide

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    env:
      HAS_REGISTRY_CREDENTIALS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the image registry
        if: env.HAS_REGISTRY_CREDENTIALS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build only (verify, credentials absent)
        if: env.HAS_REGISTRY_CREDENTIALS != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (latest)
        if: env.HAS_REGISTRY_CREDENTIALS == 'true' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (release)
        if: env.HAS_REGISTRY_CREDENTIALS == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
