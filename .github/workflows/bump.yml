name: Bump

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Bump level (patch / minor / major / explicit x.y.z)"
        required: true
        type: string
        default: "patch"

permissions:
  contents: read

jobs:
  bump:
    name: Run release prep script
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@1.94.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: bump

      - name: Install protoc
        # egide-api compiles its gRPC surface from .proto files at build time
        # (tonic-prost-build), so protoc must be on PATH for fmt/clippy/test
        # to succeed inside scripts/release.sh.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y protobuf-compiler

      - name: Install cargo-release
        # egide's MSRV (1.94) is above the 1.91 floor cargo-release 1.1+
        # requires, so the latest stable release can be used directly.
        run: cargo install --locked cargo-release@1.1.3

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release prep script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Invoked via `bash` explicitly so the runner does not depend on
        # the executable bit, which is not always preserved when the
        # script is committed from a Windows workstation.
        run: bash scripts/release.sh "${{ inputs.level }}"
