name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure the tag is reachable from main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from main. Refusing to publish." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install protoc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y protobuf-compiler

      - name: Publish crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail

          version="${GITHUB_REF_NAME#v}"
          user_agent="egide-release (https://github.com/nubster-opensources/egide)"
          crates=(
            egide-crypto
            egide-storage
            egide-storage-sqlite
            egide-storage-postgres
            egide-kms
            egide-pki
            egide-seal
            egide-secrets
            egide-transit
            egide-cli
            egide
          )

          for crate in "${crates[@]}"; do
            if curl -sf -A "${user_agent}" \
                 "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1; then
              echo "Skipping ${crate} ${version}: already on crates.io"
              continue
            fi

            attempt=1
            max_attempts=8
            while true; do
              if output=$(cargo publish -p "${crate}" --locked 2>&1); then
                echo "${output}"
                break
              fi
              echo "${output}"
              if echo "${output}" | grep -qiE "already (uploaded|exists)"; then
                echo "${crate} ${version} already published: continuing"
                break
              fi
              if echo "${output}" | grep -qiE "429|too many requests|rate limit"; then
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  echo "Rate limit not cleared for ${crate} after ${attempt} attempts" >&2
                  exit 1
                fi
                echo "Rate limited on ${crate} (attempt ${attempt}/${max_attempts}); waiting 180s"
                attempt=$((attempt + 1))
                sleep 180
                continue
              fi
              echo "Publishing ${crate} failed with a non-retriable error" >&2
              exit 1
            done
          done

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-crates
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v v="## [$VERSION]" '
            index($0, v) == 1 {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No changelog section found for [$VERSION]; using a placeholder."
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Release notes preview ---"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
