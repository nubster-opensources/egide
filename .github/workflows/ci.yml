name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protoc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y protobuf-compiler

      - name: Install security tools
        run: |
          command -v cargo-audit || cargo install cargo-audit --locked
          command -v cargo-deny || cargo install cargo-deny@0.19.6 --locked

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build server (for integration tests)
        run: cargo build -p egide-server

      - name: Test
        run: cargo test --all-features

      - name: Security audit
        run: cargo audit

      - name: Dependency check
        run: cargo deny check advisories bans sources

      - name: Build release
        if: github.ref == 'refs/heads/main'
        run: cargo build --release --locked

  msrv-check:
    name: MSRV check (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Install protoc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y protobuf-compiler

      - run: cargo +1.88 check --workspace --all-features
