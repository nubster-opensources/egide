syntax = "proto3";

package egide.v1;

/// Transit domain: encryption-as-a-service without exposing key material.
service TransitService {
  rpc CreateKey(CreateKeyRequest) returns (CreateKeyResponse);
  rpc DeleteKey(DeleteKeyRequest) returns (DeleteKeyResponse);
  rpc RotateKey(RotateKeyRequest) returns (RotateKeyResponse);
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);
  rpc GetKey(GetKeyRequest) returns (GetKeyResponse);
  rpc Encrypt(EncryptRequest) returns (EncryptResponse);
  rpc Decrypt(DecryptRequest) returns (DecryptResponse);
  rpc Datakey(DatakeyRequest) returns (DatakeyResponse);
  rpc Rewrap(RewrapRequest) returns (RewrapResponse);
}

message CreateKeyRequest {
  string name = 1;
  string key_type = 2;
  bool deletion_allowed = 3;
}

message CreateKeyResponse {}

message DeleteKeyRequest {
  string name = 1;
}

message DeleteKeyResponse {}

message RotateKeyRequest {
  string name = 1;
}

message RotateKeyResponse {
  uint32 version = 1;
}

message ListKeysRequest {}

message ListKeysResponse {
  repeated string names = 1;
}

message GetKeyRequest {
  string name = 1;
}

message GetKeyResponse {
  string name = 1;
  string key_type = 2;
  uint32 latest_version = 3;
  uint32 min_encryption_version = 4;
  uint32 min_decryption_version = 5;
  bool supports_encryption = 6;
  bool supports_decryption = 7;
  bool supports_derivation = 8;
  bool exportable = 9;
  bool deletion_allowed = 10;
  uint64 created_at = 11;
  uint64 updated_at = 12;
}

message EncryptRequest {
  string name = 1;
  bytes plaintext = 2;
}

message EncryptResponse {
  string ciphertext = 1;
}

message DecryptRequest {
  string name = 1;
  string ciphertext = 2;
}

message DecryptResponse {
  bytes plaintext = 1;
}

message DatakeyRequest {
  string name = 1;
}

message DatakeyResponse {
  bytes plaintext = 1;
  string ciphertext = 2;
}

message RewrapRequest {
  string name = 1;
  string ciphertext = 2;
}

message RewrapResponse {
  string ciphertext = 1;
}
