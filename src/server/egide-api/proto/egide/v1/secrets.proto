syntax = "proto3";

package egide.v1;

/// Secrets domain: versioned key-value secret storage.
service SecretsService {
  rpc Get(GetSecretRequest) returns (GetSecretResponse);
  rpc Put(PutSecretRequest) returns (PutSecretResponse);
  rpc Delete(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc List(ListSecretsRequest) returns (ListSecretsResponse);
}

message GetSecretRequest {
  string path = 1;
}

message GetSecretResponse {
  map<string, string> data = 1;
  uint32 version = 2;
  uint64 created_at = 3;
}

message PutSecretRequest {
  string path = 1;
  map<string, string> data = 2;
  // Optional check-and-set version. If set, write only succeeds when current
  // version matches. Use 0 to require the path to be absent.
  bool has_cas = 3;
  uint32 cas = 4;
}

message PutSecretResponse {
  uint32 version = 1;
}

message DeleteSecretRequest {
  string path = 1;
}

message DeleteSecretResponse {}

message ListSecretsRequest {
  string prefix = 1;
}

message ListSecretsResponse {
  repeated SecretMeta entries = 1;
}

message SecretMeta {
  string path = 1;
  uint32 version = 2;
  uint64 created_at = 3;
}
